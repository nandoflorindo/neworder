<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Order - KS Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #020617; color: #e2e8f0; font-family: 'Rajdhani', sans-serif; background-image: radial-gradient(circle at top right, #1e1b4b, transparent); min-height: 100vh; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 2px solid rgba(255, 255, 255, 0.1); border-radius: 16px; }
        .neon-text-red { color: #ef4444; text-shadow: 0 0 15px rgba(239, 68, 68, 0.8); }
        .logo-glow { filter: drop-shadow(0 0 15px rgba(239, 68, 68, 0.9)); }
        input, select, textarea { background: rgba(15, 23, 42, 0.9) !important; border: 2px solid #334155 !important; color: white !important; padding: 14px !important; border-radius: 12px !important; outline: none; font-size: 16px !important; width: 100%; }
       
        .rank-1 { border-left: 6px solid #fbbf24 !important; color: #fbbf24; text-shadow: 0 0 12px rgba(251, 191, 36, 0.4); }
        .rank-2 { border-left: 6px solid #cbd5e1 !important; color: #cbd5e1; }
        .rank-3 { border-left: 6px solid #b45309 !important; color: #b45309; }
       
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 500; align-items: center; justify-content: center; padding: 20px; }
        .switch { position: relative; display: inline-block; width: 54px; height: 28px; flex-shrink: 0; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background-color: #1e293b; transition: .4s; border-radius: 28px; border: 2px solid #334155; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 2px; background-color: #94a3b8; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #059669; border-color: #10b981; }
        input:checked + .slider:before { transform: translateX(26px); background-color: white; }
       
        #onlineList { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; max-height: 100px; overflow-y: auto; padding: 5px; }
        @media (max-width: 1024px) { #onlineList { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 768px) {
            h1 { font-size: 2.5rem !important; }
            .logo-header { width: 80px !important; height: 80px !important; }
            .p-10 { padding: 1.5rem !important; }
            th, td { padding: 12px !important; font-size: 14px; }
            .adm-tool.flex { flex-direction: column; width: 100%; }
        }
        .paste-btn-active { border: 2px solid #ef4444 !important; background: rgba(239, 68, 68, 0.2) !important; color: #ef4444 !important; }
        .pending-alert { animation: pulse-yellow 1.5s infinite !important; background-color: #eab308 !important; color: black !important; }
        @keyframes pulse-yellow { 0% { box-shadow: 0 0 0 0 rgba(234, 179, 8, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(234, 179, 8, 0); } 100% { box-shadow: 0 0 0 0 rgba(234, 179, 8, 0); } }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="zoomModal" onclick="this.style.display='none'" class="fixed inset-0 bg-black/95 z-[600] hidden justify-center items-center cursor-zoom-out">
        <img id="modalImg" src="" style="max-width:95%; max-height:95%; border:2px solid #ef4444;">
    </div>

    <div id="editModal" class="modal">
        <div class="glass p-6 md:p-8 w-full max-w-lg space-y-6 border-t-4 border-red-600">
            <h3 class="text-2xl font-bold uppercase text-red-500 italic">Analisar KS</h3>
            <div>
                <label class="text-xs uppercase font-bold text-slate-500">Decisão</label>
                <select id="editStatus" class="w-full" onchange="toggleReasonField()">
                    <option value="Pendente">Pendente</option>
                    <option value="Aprovado">Aprovado</option>
                    <option value="Recusado">Recusado</option>
                </select>
            </div>
            <div id="reasonDiv" class="hidden">
                <label class="text-xs uppercase font-bold text-slate-500">Motivo da Recusa</label>
                <textarea id="editReason" class="w-full h-28" placeholder="Explique o erro..."></textarea>
            </div>
            <div>
                <label class="text-xs uppercase font-bold text-slate-500">Pontuação</label>
                <input type="number" id="editPoints" class="w-full">
            </div>
            <div class="flex gap-4 pt-3">
                <button onclick="saveEdit()" class="flex-1 bg-green-600 py-4 rounded-xl font-bold uppercase">Confirmar</button>
                <button onclick="closeModal('editModal')" class="flex-1 bg-slate-800 py-4 rounded-xl font-bold uppercase">Cancelar</button>
            </div>
        </div>
    </div>

    <div class="w-full max-w-[2000px] mx-auto">
        <div id="waitScreen" class="hidden max-w-lg mx-auto mt-20 glass p-10 text-center border-t-4 border-yellow-600 shadow-2xl">
            <h2 class="text-3xl md:text-5xl font-bold text-yellow-500 mb-8 uppercase italic">Acesso Restrito</h2>
            <p class="text-xl text-slate-400 mb-10">Aguarde a aprovação do Nando.</p>
            <button onclick="logout()" class="text-blue-400 underline uppercase text-sm">Sair da Conta</button>
        </div>

        <div id="loginSection" class="max-w-md mx-auto mt-10 glass p-6 md:p-10 text-center border-t-4 border-red-600 shadow-2xl">
            <img src="logoneworder.png" class="w-32 md:w-40 mx-auto mb-6 logo-glow">
            <h2 class="text-3xl md:text-4xl font-bold mb-10 neon-text-red uppercase italic">New Order</h2>
            <div class="space-y-6">
                <input type="email" id="userEmail" placeholder="E-mail">
                <input type="password" id="userPass" placeholder="Senha">
                <div id="registerFields" class="hidden"><input type="text" id="userNickRegister" placeholder="Nick do Char"></div>
                <button id="mainBtn" onclick="handleAuth()" class="w-full bg-red-600 py-4 rounded font-bold text-white uppercase text-lg hover:bg-red-500 transition">Entrar</button>
                <div class="flex justify-between text-[10px] font-bold text-slate-500 uppercase cursor-pointer">
                    <span onclick="toggleAuthMode()" id="toggleBtn">Criar Nova Conta</span>
                    <span onclick="resetPassword()">Esqueci a Senha</span>
                </div>
            </div>
        </div>

        <div id="dashboard" class="hidden">
            <header class="flex flex-col xl:flex-row justify-between items-center mb-10 pb-10 border-b-2 border-slate-800 gap-8">
                <div class="flex items-center gap-6 md:gap-10">
                    <img src="logoneworder.png" class="logo-header w-20 h-20 md:w-28 md:h-28 object-contain logo-glow">
                    <div>
                        <h1 class="text-4xl md:text-6xl font-bold neon-text-red uppercase italic leading-none tracking-tighter">New Order</h1>
                        <div class="flex items-center gap-4 mt-4">
                            <p id="welcomeMsg" class="text-blue-400 font-bold text-lg md:text-2xl uppercase italic border-r-2 border-slate-700 pr-4 leading-none"></p>
                            <div class="flex items-center gap-3 bg-slate-900/80 px-3 py-2 rounded-full border-2 border-slate-700 shadow-lg">
                                <span id="statusLabel" class="text-[10px] font-bold uppercase text-slate-500">Offline</span>
                                <label class="switch"><input type="checkbox" id="statusToggle" onchange="toggleOnlineStatus()"><span class="slider"></span></label>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="glass p-5 border-slate-700 border-2 min-w-full md:min-w-[380px] shadow-lg">
                    <h3 class="text-sm font-bold text-slate-500 uppercase mb-3 italic border-b-2 border-slate-800/50 pb-2">Ativo no KS:</h3>
                    <div id="onlineList"></div>
                </div>
                <div class="flex flex-wrap justify-center gap-4">
                    <div class="adm-tool hidden flex gap-4">
                        <input type="date" id="filterStart" class="h-12 w-32 md:w-auto">
                        <input type="date" id="filterEnd" class="h-12 w-32 md:w-auto">
                        <button onclick="generateWarReport()" class="bg-indigo-600 hover:bg-indigo-500 text-xs px-6 rounded-xl font-bold uppercase transition shadow-xl">Relatório</button>
                    </div>
                    <button id="memberManageBtn" onclick="showUserPanel()" class="adm-tool hidden bg-slate-700 hover:bg-slate-600 text-xs px-6 rounded-xl font-bold uppercase transition">Membros</button>
                    <button onclick="logout()" class="bg-slate-800 hover:bg-red-900 text-xs px-6 rounded-xl font-bold uppercase transition border-2 border-slate-700">Sair</button>
                </div>
            </header>

            <div id="userPanel" class="hidden mb-10 glass p-6 md:p-10 border-blue-500/30 text-white shadow-2xl overflow-x-auto">
                <table class="w-full text-left min-w-[500px]">
                    <thead><tr class="text-slate-500 uppercase text-xs border-b-2 border-slate-800"><th class="pb-5">Nick</th><th class="pb-5">Cargo/Status</th><th class="pb-5 text-right">Ações</th></tr></thead>
                    <tbody id="usersTableBody"></tbody>
                </table>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
                <div class="lg:col-span-3 space-y-10 order-2 lg:order-1">
                    <div class="glass p-6 md:p-10 border-l-8 border-red-600 shadow-2xl">
                        <h2 class="text-2xl md:text-3xl font-bold mb-8 text-red-500 uppercase italic border-b-2 border-red-900/20 pb-4">Reportar KS</h2>
                        <div class="space-y-6">
                            <input type="text" id="enemyName" placeholder="Nick Inimigo">
                            <input type="text" id="respawn" placeholder="Hunt / Local">
                            <div class="grid grid-cols-2 gap-4">
                                <input type="time" id="timeStart">
                                <input type="time" id="timeEnd">
                            </div>
                            <div class="p-4 md:p-6 bg-slate-900/50 rounded-xl border-2 border-slate-700 space-y-5">
                                <div class="space-y-3">
                                    <label class="text-xs font-bold text-slate-500 uppercase">Print 1</label>
                                    <input type="file" id="imgStart" accept="image/*" class="text-xs">
                                    <button id="btnPaste1" onclick="handlePasteAction('imgStart', this)" class="w-full bg-slate-800 border-2 border-slate-600 py-3 rounded-lg font-bold uppercase text-[10px] hover:border-red-500 transition shadow-lg">Colar (Ctrl+V)</button>
                                </div>
                                <div class="space-y-3">
                                    <label class="text-xs font-bold text-slate-500 uppercase">Print 2</label>
                                    <input type="file" id="imgEnd" accept="image/*" class="text-xs">
                                    <button id="btnPaste2" onclick="handlePasteAction('imgEnd', this)" class="w-full bg-slate-800 border-2 border-slate-600 py-3 rounded-lg font-bold uppercase text-[10px] hover:border-red-500 transition shadow-lg">Colar (Ctrl+V)</button>
                                </div>
                                <button onclick="clearPrints()" class="w-full text-slate-500 text-xs font-bold uppercase hover:text-white transition">Limpar Prints</button>
                            </div>
                            <button id="sendBtn" onclick="sendReport()" class="w-full bg-green-600 hover:bg-green-700 py-5 rounded-xl font-bold uppercase text-lg shadow-xl transition">Transmitir KS</button>
                        </div>
                    </div>
                    <div class="glass p-6 adm-tool hidden shadow-lg">
                        <h2 class="text-xl font-bold text-yellow-500 uppercase border-b-2 border-yellow-900/30 pb-4 mb-8">Top 10 Operadores</h2>
                        <div id="ranking" class="space-y-4"></div>
                    </div>
                </div>

                <div class="lg:col-span-6 order-1 lg:order-2">
                    <div class="glass p-6 md:p-10 min-h-[600px] shadow-2xl">
                        <div class="flex flex-col md:flex-row justify-between items-center mb-8 border-b-2 border-slate-800 pb-8 gap-6">
                            <h2 class="text-3xl md:text-4xl font-bold uppercase text-slate-400 italic">Lista KS</h2>
                            <div class="flex flex-col md:flex-row gap-4 w-full md:w-auto">
                                <select id="filterStatusMural" onchange="loadReports()" class="glass text-base">
                                    <option value="Todos">Todos</option>
                                    <option value="Pendente">Pendentes</option>
                                    <option value="Aprovado">Aprovados</option>
                                    <option value="Recusado">Recusados</option>
                                </select>
                                <input type="text" id="searchEnemy" oninput="loadReports()" placeholder="BUSCAR..." class="glass uppercase font-bold">
                            </div>
                        </div>
                        <div class="overflow-x-auto text-white">
                            <table class="w-full text-left min-w-[600px]">
                                <thead class="border-b-2 border-slate-800">
                                    <tr><th class="p-4">Data</th><th class="p-4">Alvo/Local</th><th class="p-4">Nick</th><th class="p-4 text-center">Pts</th><th class="p-4 text-center">Prints</th><th class="p-4 text-right adm-tool hidden">Ações</th></tr>
                                </thead>
                                <tbody id="reportsBody" class="divide-y divide-slate-800/50"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div class="lg:col-span-3 order-3 lg:order-3">
                    <div class="glass p-6 md:p-10 shadow-2xl border-t-4 border-red-900/50">
                        <div class="flex justify-between items-center mb-8">
                            <h2 class="text-2xl md:text-3xl font-bold uppercase text-red-600 italic">Hunted List</h2>
                            <button onclick="toggleHuntedForm()" class="adm-tool hidden bg-red-600 px-4 py-2 rounded-lg font-bold shadow-lg text-2xl">+</button>
                        </div>
                        <input type="text" id="searchHunted" oninput="loadHunteds()" placeholder="FILTRAR..." class="w-full mb-8 glass uppercase">
                        <div id="huntedForm" class="hidden mb-10 p-6 bg-slate-900/50 rounded-2xl space-y-6 border-2 border-slate-800 shadow-lg">
                            <input type="text" id="hNick" placeholder="Nick">
                            <input type="number" id="hLevel" placeholder="Level">
                            <select id="hVoc">
                                <option value="EK">EK</option><option value="ED">ED</option><option value="MS">MS</option><option value="RP">RP</option><option value="Monk">Monk</option>
                            </select>
                            <button onclick="addHunted()" class="w-full bg-green-600 py-4 rounded-xl font-bold uppercase">Adicionar</button>
                        </div>
                        <div class="overflow-x-auto text-white">
                            <table class="w-full text-left text-base min-w-[250px]">
                                <thead class="border-b-2 border-slate-800"><tr class="text-slate-500 uppercase text-xs"><th>Nick</th><th>Lvl</th><th>Voc</th><th class="text-right adm-tool hidden">Ação</th></tr></thead>
                                <tbody id="huntedBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBfaLwifXIROIamUTQ0I4fakdbwAeHMWXU",
            authDomain: "lastdance-ks.firebaseapp.com",
            projectId: "lastdance-ks",
            storageBucket: "lastdance-ks.firebasestorage.app",
            messagingSenderId: "908930111088",
            appId: "1:908930111088:web:a80f636a32b7a3ce1906b5",
            databaseURL: "https://lastdance-ks-default-rtdb.firebaseio.com"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage();
        const rtdb = firebase.database();

        let currentUID = "", currentNick = "", isAdmin = false, isRegisterMode = false;
        let activeInputId = null, activeBtn = null, priorityAlvos = [];
        let currentReportId = null;
        let presenceRef = null;

        function clearPrints() {
            document.getElementById('imgStart').value = "";
            document.getElementById('imgEnd').value = "";
            resetPasteButtons();
            activeInputId = null;
        }

        function resetPasteButtons() {
            const b1 = document.getElementById('btnPaste1');
            const b2 = document.getElementById('btnPaste2');
            b1.innerText = "Colar (Ctrl+V)"; b1.classList.remove('paste-btn-active');
            b2.innerText = "Colar (Ctrl+V)"; b2.classList.remove('paste-btn-active');
        }

        async function handlePasteAction(inputId, btn) {
            try {
                const clipboardItems = await navigator.clipboard.read();
                for (const item of clipboardItems) {
                    for (const type of item.types) {
                        if (type.startsWith('image/')) {
                            const blob = await item.getType(type);
                            const dt = new DataTransfer();
                            dt.items.add(new File([blob], "paste.png", { type }));
                            document.getElementById(inputId).files = dt.files;
                            btn.innerText = "FOTO OK!";
                            btn.style.background = "#059669";
                            return;
                        }
                    }
                }
                activatePasteFallback(inputId, btn);
            } catch (err) {
                activatePasteFallback(inputId, btn);
            }
        }

        function activatePasteFallback(inputId, btn) {
            resetPasteButtons();
            activeInputId = inputId;
            activeBtn = btn;
            btn.classList.add('paste-btn-active');
            btn.innerText = "AGUARDANDO CTRL+V...";
        }

        window.addEventListener('keydown', e => {
            if (e.key === 'Escape' && activeInputId) {
                resetPasteButtons();
                activeInputId = null;
            }
        });

        window.addEventListener('paste', e => {
            if (!activeInputId) return;
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let index in items) {
                const item = items[index];
                if (item.kind === 'file') {
                    const blob = item.getAsFile();
                    const dt = new DataTransfer();
                    dt.items.add(blob);
                    document.getElementById(activeInputId).files = dt.files;
                    activeBtn.innerText = "FOTO OK!";
                    activeBtn.classList.remove('paste-btn-active');
                    activeBtn.style.background = "#059669";
                    activeInputId = null;
                }
            }
        });

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUID = user.uid;
                const doc = await db.collection("users").doc(user.uid).get();
                if (doc.exists) {
                    const ud = doc.data();
                    if (ud.status === "pendente" && ud.role !== "admin") {
                        document.getElementById('loginSection').classList.add('hidden');
                        document.getElementById('waitScreen').classList.remove('hidden');
                        return;
                    }
                    currentNick = ud.nick;
                    isAdmin = ud.role === "admin";
                    document.getElementById('dashboard').classList.remove('hidden');
                    document.getElementById('loginSection').classList.add('hidden');
                    document.getElementById('welcomeMsg').innerText = `Nick: ${currentNick}`;

                    setupPresence(user.uid);

                    db.collection("hunteds").where("priority", "==", true).onSnapshot(s => {
                        priorityAlvos = s.docs.map(d => d.data().nick.toUpperCase());
                        loadReports();
                    });

                    monitorOnline();

                    if (isAdmin) {
                        document.querySelectorAll('.adm-tool').forEach(t => t.classList.remove('hidden'));
                        loadUsers();
                        cleanupOldReports();
                        db.collection("users").where("status", "==", "pendente").onSnapshot(snap => {
                            const b = document.getElementById('memberManageBtn');
                            if (snap.size > 0) b.classList.add('pending-alert');
                            else b.classList.remove('pending-alert');
                        });
                    }

                    loadReports();
                    loadHunteds();
                }
            } else {
                document.getElementById('loginSection').classList.remove('hidden');
                document.getElementById('dashboard').classList.add('hidden');
                if (presenceRef) presenceRef.onDisconnect().cancel();
            }
        });

        function setupPresence(uid) {
            presenceRef = rtdb.ref('/status/' + uid);

            presenceRef.set({
                isOnline: true,
                nick: currentNick,
                lastActive: firebase.database.ServerValue.TIMESTAMP
            }).catch(err => console.error("Erro ao setar online:", err));

            presenceRef.onDisconnect().set({
                isOnline: false,
                nick: currentNick,
                lastActive: firebase.database.ServerValue.TIMESTAMP
            }).catch(err => console.error("Erro no onDisconnect:", err));

            setInterval(() => {
                if (presenceRef) {
                    presenceRef.update({ lastActive: firebase.database.ServerValue.TIMESTAMP });
                }
            }, 30000);
        }

        async function toggleOnlineStatus() {
            const checked = document.getElementById('statusToggle').checked;
            if (presenceRef) {
                await presenceRef.update({ isOnline: checked }).catch(err => console.error("Erro ao atualizar toggle:", err));
            }
            await db.collection("users").doc(currentUID).update({ isOnline: checked }).catch(err => console.error("Erro no Firestore sync:", err));
        }

        function monitorOnline() {
            rtdb.ref('/status').on('value', snap => {
                const div = document.getElementById('onlineList');
                div.innerHTML = '';
                snap.forEach(child => {
                    const data = child.val();
                    if (data && data.isOnline === true) {
                        div.innerHTML += `<span class="bg-slate-800 px-4 py-2 rounded-lg border-2 border-green-500/20 text-green-400 shadow-sm text-sm">● ${data.nick || 'Usuário'}</span>`;
                    }
                });
            }, err => console.error("Erro no listener online:", err));
        }

        // Listener dedicado para sincronizar o toggle e label com o status real
        auth.onAuthStateChanged(user => {
            if (user) {
                rtdb.ref('/status/' + user.uid).on('value', snap => {
                    const data = snap.val() || { isOnline: false };
                    const isOnline = !!data.isOnline;
                    document.getElementById('statusToggle').checked = isOnline;
                    document.getElementById('statusLabel').innerText = isOnline ? "Online" : "Offline";
                    document.getElementById('statusLabel').className = isOnline 
                        ? "text-[10px] font-bold uppercase text-green-500" 
                        : "text-[10px] font-bold uppercase text-slate-500";
                }, err => console.error("Erro no listener do toggle:", err));
            }
        });

        function loadReports() {
            const search = document.getElementById('searchEnemy').value.toUpperCase(), filter = document.getElementById('filterStatusMural').value;
            db.collection("reports").orderBy("timestamp", "desc").onSnapshot(snap => {
                const tbody = document.getElementById('reportsBody'); tbody.innerHTML = ""; let sc = {};
                snap.forEach(doc => {
                    const r = doc.data(); if(r.status === "Aprovado") sc[r.reporter] = (sc[r.reporter] || 0) + (r.points || 0);
                    const prio = priorityAlvos.includes(r.enemy.toUpperCase()), vis = isAdmin || r.status !== "Pendente" || r.reporter === currentNick;
                    if (vis && (!search || r.enemy.includes(search) || r.respawn?.toUpperCase().includes(search)) && (filter === "Todos" || r.status === filter)) {
                        tbody.innerHTML += `<tr class="hover:bg-slate-800/30 ${prio?'priority-row':''}">
                            <td class="p-4 text-xs italic font-bold text-slate-500">${r.timestamp?.toDate().toLocaleDateString() || '...'}</td>
                            <td class="p-4"><div class="font-bold text-red-500 uppercase text-lg">${r.enemy}</div><div class="text-sm text-slate-400 italic">${r.respawn || ''}</div></td>
                            <td class="p-4 font-bold uppercase text-md italic">${r.reporter}</td>
                            <td class="p-4 font-bold text-yellow-500 text-center text-xl">${r.points} pts<br><span class="text-[10px] uppercase ${r.status==='Recusado'?'text-red-500':'text-blue-400'}">${r.status}</span>
                            ${r.status === 'Recusado' && r.reason ? `<div class="text-[10px] text-red-400 italic mt-1">${r.reason}</div>` : ''}
                            </td>
                            <td class="p-4 text-center"><button onclick="openZoom('${r.imgStart}')" class="text-blue-500 font-bold underline">P1</button>${r.imgEnd?`<button onclick="openZoom('${r.imgEnd}')" class="text-blue-500 font-bold underline ml-4">P2</button>`:''}</td>
                            <td class="p-4 text-right adm-tool ${isAdmin?'':'hidden'} space-x-4"><button onclick="openEditModal('${doc.id}','${r.status}',${r.points},'${r.reason||''}')" class="text-white text-2xl">✎</button><button onclick="if(confirm('Remover?'))db.collection('reports').doc('${doc.id}').delete()" class="text-red-900 text-2xl font-bold">X</button></td>
                        </tr>`;
                    }
                });
                renderRanking(sc);
            });
        }

        function renderRanking(sc) { const sorted = Object.entries(sc).sort((a,b)=>b[1]-a[1]).slice(0, 10); document.getElementById('ranking').innerHTML = sorted.map(([n, p], i) => `<div class="flex justify-between p-4 glass text-base shadow-md ${i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':''}"><span><b>${i+1}.</b> ${n}</span><span class="font-black">${p} pts</span></div>`).join(''); }

        function loadHunteds() { const search = document.getElementById('searchHunted').value.toUpperCase(); db.collection("hunteds").orderBy("nick", "asc").onSnapshot(snap => { const tbody = document.getElementById('huntedBody'); tbody.innerHTML = ""; snap.forEach(doc => { const h = doc.data(); if(!search || h.nick.includes(search) || h.lvl?.toString().includes(search) || h.voc?.toUpperCase().includes(search)) { tbody.innerHTML += `<tr class="border-b border-slate-800/50"><td class="py-4 font-bold uppercase text-lg ${h.priority?'text-yellow-500':'text-red-500'}">${h.priority?'⭐ ':''}${h.nick}</td><td class="py-4 text-slate-400 italic font-bold text-base text-center">${h.lvl || '--'}</td><td class="py-4 text-blue-400 font-bold text-base text-center">${h.voc || '--'}</td><td class="py-4 text-right adm-tool ${isAdmin?'':'hidden'}"><button onclick="db.collection('hunteds').doc('${doc.id}').update({priority:!${h.priority||false}})" class="text-slate-500 hover:text-yellow-500 mr-5">⭐</button><button onclick="if(confirm('Remover?'))db.collection('hunteds').doc('${doc.id}').delete()" class="text-red-900 font-bold">X</button></td></tr>`; } }); }); }

        function loadUsers() { db.collection("users").onSnapshot(snap => { const tbody = document.getElementById('usersTableBody'); tbody.innerHTML = ""; snap.forEach(doc => { const u = doc.data(); const isP = u.status === 'pendente'; tbody.innerHTML += `<tr class="border-b border-slate-800/50"><td class="p-4 font-bold uppercase italic text-xl">${u.nick}</td><td class="p-4"><span class="text-base uppercase ${u.role==='admin'?'text-red-500':'text-blue-400'}">${u.role}</span> <span class="text-sm ${isP?'text-yellow-500':'text-green-500'}">[${u.status}]</span></td><td class="p-4 text-right space-x-4">${isP?`<button onclick="db.collection('users').doc('${doc.id}').update({status:'aprovado'})" class="bg-green-600 px-4 py-2 rounded-xl font-bold uppercase text-sm">OK</button>`:''}<button onclick="db.collection('users').doc('${doc.id}').update({role:'${u.role==='admin'?'member':'admin'}'})" class="bg-blue-600 px-4 py-2 rounded-xl font-bold uppercase text-sm">CARGO</button><button onclick="if(confirm('Banir?'))db.collection('users').doc('${doc.id}').delete()" class="bg-red-900 px-4 py-2 rounded-xl font-bold uppercase text-sm">X</button></td></tr>`; }); }); }

        async function handleAuth() { const email = document.getElementById('userEmail').value, pass = document.getElementById('userPass').value, nick = document.getElementById('userNickRegister').value, btn = document.getElementById('mainBtn'); if(!email || !pass) return alert("Preencha!"); btn.innerText = "..."; try { if (isRegisterMode) { const res = await auth.createUserWithEmailAndPassword(email, pass); await db.collection("users").doc(res.user.uid).set({ nick, email, role: "member", status: "pendente", isOnline: false, timestamp: firebase.firestore.FieldValue.serverTimestamp() }); alert("Aguarde liberação!"); await auth.signOut(); location.reload(); } else { await auth.signInWithEmailAndPassword(email, pass); } } catch (e) { alert(e.message); btn.innerText = "Entrar"; } }

        async function sendReport() { const btn = document.getElementById('sendBtn'); const en = document.getElementById('enemyName').value.trim(); if(!en) return alert("Nick Inimigo!"); btn.innerText = "Enviando..."; btn.disabled = true; try { const u1 = await upload(document.getElementById('imgStart').files[0]), u2 = await upload(document.getElementById('imgEnd').files[0]); await db.collection("reports").add({ enemy: en.toUpperCase(), respawn: document.getElementById('respawn').value.trim(), reporter: currentNick, timeS: document.getElementById('timeStart').value, timeE: document.getElementById('timeEnd').value, imgStart: u1, imgEnd: u2, status: "Pendente", points: 0, timestamp: firebase.firestore.FieldValue.serverTimestamp() }); alert("Enviado com sucesso!"); location.reload(); } catch(e){ console.error(e); alert("Erro: " + e.message); } finally { btn.innerText = "Transmitir KS"; btn.disabled = false; } }

        async function upload(f) { if(!f) return null; const ref = storage.ref(`provas/${Date.now()}_${f.name}`); await ref.put(f); return await ref.getDownloadURL(); }

        function openEditModal(id, status, points, reason) { currentReportId = id; document.getElementById('editStatus').value = status; document.getElementById('editPoints').value = points || 0; document.getElementById('editReason').value = reason || ''; toggleReasonField(); document.getElementById('editModal').style.display = 'flex'; }

        function toggleReasonField() { document.getElementById('reasonDiv').style.display = document.getElementById('editStatus').value === 'Recusado' ? 'block' : 'none'; }

        async function saveEdit() { await db.collection("reports").doc(currentReportId).update({ status: document.getElementById('editStatus').value, points: parseInt(document.getElementById('editPoints').value || 0), reason: document.getElementById('editStatus').value === 'Recusado' ? document.getElementById('editReason').value.trim() : "" }); closeModal('editModal'); }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        async function addHunted() { const n = document.getElementById('hNick').value.trim().toUpperCase(), l = parseInt(document.getElementById('hLevel').value), v = document.getElementById('hVoc').value; if(!n || isNaN(l)) return alert("Preencha nick e level!"); await db.collection("hunteds").add({ nick: n, lvl: l, voc: v, priority: false, timestamp: firebase.firestore.FieldValue.serverTimestamp() }); toggleHuntedForm(); }

        function toggleAuthMode() { isRegisterMode = !isRegisterMode; document.getElementById('registerFields').classList.toggle('hidden'); document.getElementById('mainBtn').innerText = isRegisterMode ? "Cadastrar" : "Entrar"; }

        function logout() { auth.signOut(); location.reload(); }

        function showUserPanel() { document.getElementById('userPanel').classList.toggle('hidden'); }

        function toggleHuntedForm() { document.getElementById('huntedForm').classList.toggle('hidden'); }

        function openZoom(u) { document.getElementById('modalImg').src = u; document.getElementById('zoomModal').style.display = 'flex'; }

        async function cleanupOldReports() { 
            const limit = new Date(); limit.setDate(limit.getDate() - 30); 
            const snap = await db.collection("reports").where("timestamp", "<", limit).get(); 
            snap.forEach(doc => db.collection("reports").doc(doc.id).delete()); 
        }

        function resetPassword() { const e = document.getElementById('userEmail').value.trim(); if(e) auth.sendPasswordResetEmail(e).then(() => alert("Link enviado!")); }

        function generateWarReport() { const s = document.getElementById('filterStart').value, e = document.getElementById('filterEnd').value; if(!s || !e) return alert("Datas!"); db.collection("reports").where("status", "==", "Aprovado").get().then(snap => { let ms = {}, to = 0, tp = 0; snap.forEach(doc => { const r = doc.data(), d = r.timestamp.toDate().toISOString().split('T')[0]; if(d >= s && d <= e) { to++; tp += r.points; ms[r.reporter] = (ms[r.reporter] || 0) + r.points; } }); if(to === 0) return alert("Sem registros!"); let l = `⚔️ **NEW ORDER AUDIT** ⚔️\n📅 **PERÍODO:** ${s} a ${e}\n📊 **TOTAL:** ${to} Ops | ${tp} pts\n\n🏆 **RANKING:**\n`; Object.entries(ms).sort((a,b)=>b[1]-a[1]).forEach(([n,p],i)=> l += `${i+1}. ${n}: ${p} pts\n`); navigator.clipboard.writeText(l).then(() => alert("COPIADO!")); }); }
    </script>
</body>
</html>
